name: QuietVibeStatus
options:
  bundleIdPrefix: app.quiet
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: false
    MARKETING_VERSION: "1.0.6"
    CURRENT_PROJECT_VERSION: "7"

targets:
  QuietVibeStatus:
    type: application
    platform: macOS
    sources:
      - path: QuietVibeStatus
        excludes:
          - "Resources/bridge/**"
      - path: QuietVibeStatus/Resources/bridge
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.quiet.QuietVibeStatus
        PRODUCT_NAME: QuietVibeStatus
        INFOPLIST_KEY_LSUIElement: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "Quiet Vibe Status"
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT License — Quiet Apps"
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Quiet Vibe Status uses AppleScript to focus the terminal tab that your agent is running in."

  QuietVibeStatusTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: QuietVibeStatus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.quiet.QuietVibeStatusTests
        GENERATE_INFOPLIST_FILE: true

schemes:
  QuietVibeStatus:
    build:
      targets:
        QuietVibeStatus: all
        QuietVibeStatusTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - QuietVibeStatusTests
